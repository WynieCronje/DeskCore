<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeskCore • Beginner Core Strength</title>
    
    <!-- React + ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX support -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .video-container {
            position: relative;
            padding-top: 56.25%;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 16px;
        }
        .plank-timer {
            font-family: monospace;
            font-size: 2.75rem;
            font-weight: 700;
            letter-spacing: -2px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const exercises = [
            {
                id: "plank",
                name: "Plank",
                videoId: "ASdvN_XEl_c",
                setsReps: "3 sets of 20–30 second holds",
                rest: "45–60 seconds",
                desc: "Forearms on floor, body in straight line. Squeeze your core like you're about to be punched in the stomach."
            },
            {
                id: "bird-dog",
                name: "Bird Dog",
                videoId: "KA0ekfSePrQ",
                setsReps: "3 sets of 10 reps per side",
                rest: "45 seconds",
                desc: "On all fours. Slowly extend opposite arm and leg while keeping your back flat. Hold 1 second."
            },
            {
                id: "dead-bug",
                name: "Dead Bug",
                videoId: "g_BYB0R-4Ws",
                setsReps: "3 sets of 10 reps per side",
                rest: "45 seconds",
                desc: "Lie on back, arms up. Slowly lower opposite arm & leg while pressing lower back into floor."
            },
            {
                id: "glute-bridge",
                name: "Glute Bridge",
                videoId: "8bbE64NuDTU",
                setsReps: "3 sets of 12–15 reps",
                rest: "45 seconds",
                desc: "Lie on back, feet flat. Push through heels and squeeze glutes to lift hips."
            },
            {
                id: "superman",
                name: "Superman",
                videoId: "J9zXkxUAfUA",
                setsReps: "3 sets of 10–12 reps (hold 2–3s)",
                rest: "45 seconds",
                desc: "Lie face down. Lift arms, chest, and legs off the floor like you're flying."
            }
        ];

        const TOTAL_SETS = exercises.length * 3;

        function App() {
            const [progressData, setProgressData] = useState({ lastDate: "", completed: [] });
            const [plankSeconds, setPlankSeconds] = useState(0);
            const [isPlankRunning, setIsPlankRunning] = useState(false);

            // Load progress
            useEffect(() => {
                const saved = localStorage.getItem('deskCoreTracker');
                const today = new Date().toISOString().split('T')[0];

                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.lastDate === today) {
                        setProgressData(data);
                    } else {
                        setProgressData({ lastDate: today, completed: [] });
                    }
                } else {
                    setProgressData({ lastDate: today, completed: [] });
                }
            }, []);

            // Save progress
            useEffect(() => {
                localStorage.setItem('deskCoreTracker', JSON.stringify(progressData));
            }, [progressData]);

            // Plank Timer
            useEffect(() => {
                let interval = null;
                if (isPlankRunning) {
                    interval = setInterval(() => {
                        setPlankSeconds(prev => prev + 1);
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isPlankRunning]);

            const togglePlankTimer = () => {
                setIsPlankRunning(!isPlankRunning);
            };

            const resetPlankTimer = () => {
                setIsPlankRunning(false);
                setPlankSeconds(0);
            };

            const formatTime = (sec) => {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            const toggleComplete = (setId) => {
                setProgressData(prev => ({
                    ...prev,
                    completed: prev.completed.includes(setId)
                        ? prev.completed.filter(id => id !== setId)
                        : [...prev.completed, setId]
                }));
            };

            const resetToday = () => {
                if (window.confirm("Reset today's progress?\n\nYou can start again today.")) {
                    const today = new Date().toISOString().split('T')[0];
                    setProgressData({ lastDate: today, completed: [] });
                    resetPlankTimer();
                }
            };

            const completedCount = progressData.completed.length;
            const progressPercent = Math.round((completedCount / TOTAL_SETS) * 100);

            return (
                <div className="max-w-5xl mx-auto px-5 sm:px-6 py-8">
                    {/* Header */}
                    <div className="flex flex-col items-center text-center mb-10">
                        <div className="flex items-center gap-3 mb-4">
                            <div className="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">💪</div>
                            <h1 className="title-font text-5xl font-semibold tracking-tighter">DeskCore</h1>
                        </div>
                        <p className="text-emerald-400 text-xl font-medium">15-minute daily core reset</p>
                    </div>

                    {/* Instructions */}
                    <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 mb-8">
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                            <div>
                                <div className="flex items-center gap-3 mb-3">
                                    <div className="w-8 h-8 bg-emerald-500/10 text-emerald-400 rounded-2xl flex items-center justify-center font-bold">1</div>
                                    <h3 className="font-semibold">Track every set</h3>
                                </div>
                                <p className="text-zinc-400 text-sm">Tap the checkbox when you finish each set.</p>
                            </div>
                            <div>
                                <div className="flex items-center gap-3 mb-3">
                                    <div className="w-8 h-8 bg-emerald-500/10 text-emerald-400 rounded-2xl flex items-center justify-center font-bold">2</div>
                                    <h3 className="font-semibold">Rest between sets</h3>
                                </div>
                                <p className="text-zinc-400 text-sm">45–60 seconds. Breathe deeply.</p>
                            </div>
                            <div>
                                <div className="flex items-center gap-3 mb-3">
                                    <div className="w-8 h-8 bg-emerald-500/10 text-emerald-400 rounded-2xl flex items-center justify-center font-bold">3</div>
                                    <h3 className="font-semibold">Finish one exercise first</h3>
                                </div>
                                <p className="text-zinc-400 text-sm">Best for beginners and good form.</p>
                            </div>
                        </div>
                    </div>

                    {/* Progress Bar */}
                    <div className="mb-8 rounded-3xl overflow-hidden sticky top-0 z-50 bg-zinc-950 border-b border-zinc-800">
                        <div className="flex justify-between items-baseline px-6 py-4 bg-zinc-900">
                            <div className="text-sm font-medium text-zinc-400">TODAY'S SETS</div>
                            <div className="text-3xl font-semibold text-emerald-400 tabular-nums">{completedCount}/{TOTAL_SETS}</div>
                        </div>
                        <div className="h-2.5 bg-zinc-800">
                            <div className="h-2.5 bg-gradient-to-r from-emerald-400 to-teal-400 transition-all duration-700" 
                                 style={{ width: `${progressPercent}%` }}></div>
                        </div>
                    </div>

                    {/* Exercises */}
                    <div className="space-y-8">
                        {exercises.map(ex => {
                            const isPlank = ex.id === "plank";
                            return (
                                <div key={ex.id} className="exercise-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
                                    <div className="video-container bg-black">
                                        <iframe 
                                            src={`https://www.youtube.com/embed/${ex.videoId}`}
                                            title={ex.name}
                                            frameBorder="0"
                                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                            allowFullScreen>
                                        </iframe>
                                    </div>

                                    <div className="p-6 sm:p-8">
                                        <div className="flex justify-between items-start mb-6">
                                            <div>
                                                <h2 className="text-2xl font-semibold text-white">{ex.name}</h2>
                                                <p className="text-emerald-400 mt-1">{ex.setsReps}</p>
                                            </div>
                                        </div>

                                        <p className="text-zinc-400 leading-relaxed mb-8">{ex.desc}</p>

                                        {/* Plank Timer */}
                                        {isPlank && (
                                            <div className="mb-8 p-6 bg-zinc-950 rounded-3xl border border-zinc-800">
                                                <div className="flex justify-between items-center mb-4">
                                                    <div className="font-medium text-emerald-400">PLANK TIMER</div>
                                                    <button onClick={resetPlankTimer} className="text-xs text-zinc-400 hover:text-white">RESET</button>
                                                </div>
                                                <div className="plank-timer text-white text-center mb-6">
                                                    {formatTime(plankSeconds)}
                                                </div>
                                                <button 
                                                    onClick={togglePlankTimer}
                                                    className={`w-full py-5 rounded-3xl font-semibold text-lg transition-all ${
                                                        isPlankRunning 
                                                            ? 'bg-red-600 hover:bg-red-500' 
                                                            : 'bg-emerald-600 hover:bg-emerald-500'
                                                    }`}>
                                                    {isPlankRunning ? 'STOP TIMER' : 'START TIMER'}
                                                </button>
                                                <p className="text-center text-xs text-zinc-500 mt-3">Single tap to start / stop</p>
                                            </div>
                                        )}

                                        {/* Sets */}
                                        <div className="border-t border-zinc-800 pt-6">
                                            <div className="flex justify-between mb-5">
                                                <p className="text-xs uppercase tracking-widest text-zinc-500 font-medium">YOUR 3 SETS</p>
                                                <span className="text-xs bg-zinc-800 px-4 py-1.5 rounded-3xl">REST {ex.rest}</span>
                                            </div>
                                            <div className="space-y-3">
                                                {[1, 2, 3].map(i => {
                                                    const setId = `${ex.id}-set${i}`;
                                                    const isDone = progressData.completed.includes(setId);
                                                    return (
                                                        <div key={i} className="flex items-center justify-between bg-zinc-950 rounded-2xl px-6 py-5">
                                                            <div className="flex items-center gap-4">
                                                                <div className="w-8 h-8 bg-zinc-800 text-zinc-400 rounded-2xl flex items-center justify-center text-sm font-bold">{i}</div>
                                                                <span className="font-medium">Set {i}</span>
                                                            </div>
                                                            <label className="cursor-pointer">
                                                                <input 
                                                                    type="checkbox" 
                                                                    checked={isDone}
                                                                    onChange={() => toggleComplete(setId)}
                                                                    className="peer sr-only"
                                                                />
                                                                <div className={`w-11 h-11 border-2 rounded-3xl flex items-center justify-center transition-all ${
                                                                    isDone ? 'bg-emerald-500 border-emerald-500' : 'border-zinc-700'
                                                                }`}>
                                                                    {isDone && (
                                                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="4">
                                                                            <path strokeLinecap="round" strokeLinejoin="round" d="M5 10l7-7m0 0l7 7" />
                                                                        </svg>
                                                                    )}
                                                                </div>
                                                            </label>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Footer */}
                    <div className="mt-16 text-center">
                        <button 
                            onClick={resetToday}
                            className="w-full max-w-xs mx-auto flex items-center justify-center gap-3 bg-zinc-900 hover:bg-zinc-800 active:bg-zinc-700 border border-zinc-700 text-white px-8 py-5 rounded-3xl font-medium">
                            RESET TODAY'S PROGRESS
                        </button>
                    </div>
                </div>
            );
        }

        // Render the app
        ReactDOM.render(
            React.createElement(App),
            document.getElementById('root')
        );
    </script>
</body>
</html>
